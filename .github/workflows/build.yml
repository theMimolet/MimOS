name: Build MimOS Image
on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 7 * * 6" # Every Saturday at 7:00 UTC
  push:
    branches:
      - main
    paths:
      - mimos.containerfile
      - system/**
      - .github/workflows/build.yml
  workflow_dispatch:

env:
  IMAGE_DESC: "Mimolet's custom system image made to fit his needs for gaming and development."
  IMAGE_KEYWORDS: "linux,container,bootc,bazzite,kde,gaming,dev"
  IMAGE_LOGO_URL: "https://avatars.githubusercontent.com/u/115139719?v=4"
  IMAGE_NAME: "${{ github.event.repository.name }}"
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  DEFAULT_TAG: "latest"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}-${{ inputs.brand_name}}-${{ inputs.stream_name }}
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Prepare environment
        run: |
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> ${GITHUB_ENV}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@695eb75bc387dbcd9685a8e72d23439d8686cba6

      - name: Mount BTRFS for podman storage
        id: container-storage-action
        uses: ublue-os/container-storage-action@911baca08baf30c8654933e9e9723cb399892140
        continue-on-error: true
        with:
          mount-opts: compress-force=zstd:2

      - name: Mount BTRFS for /var/tmp
        id: var-tmp-storage-action
        uses: ublue-os/container-storage-action@911baca08baf30c8654933e9e9723cb399892140
        continue-on-error: true
        with:
          mount-opts: compress-force=zstd:2
          target-dir: /var/tmp

      - name: Get current date
        id: date
        run: |
          # This generates a timestamp like what is defined on the ArtifactHub documentation
          # E.G: 2022-02-08T15:38:15Z'
          # https://artifacthub.io/docs/topics/repositories/container-images/
          # https://linux.die.net/man/1/date
          echo "date=$(date -u +%Y\-%m\-%d\T%H\:%M\:%S\Z)" >> $GITHUB_OUTPUT

      - name: Image Metadata
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        id: metadata
        with:
          # This generates all the tags for your image, you can add custom tags here too!
          # Default tags are "$DEFAULT_TAG" and "$DEFAULT_TAG.$date".
          tags: |
            type=raw,value=${{ env.DEFAULT_TAG }}
            type=raw,value=${{ env.DEFAULT_TAG }}.{{date 'YYYYMMDD'}}
            type=raw,value={{date 'YYYYMMDD'}}
            type=sha,enable=${{ github.event_name == 'pull_request' }}
            type=ref,event=pr
          labels: |
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/${{ github.sha }}/README.md
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
            org.opencontainers.image.description=${{ env.IMAGE_DESC }}
            org.opencontainers.image.documentation=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/${{ github.sha }}/README.md
            org.opencontainers.image.source=https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/blob/${{ github.sha }}/mimos.containerfile
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.url=https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/tree/${{ github.sha }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.version=${{ env.DEFAULT_TAG }}.{{date 'YYYYMMDD'}}
            io.artifacthub.package.deprecated=false
            io.artifacthub.package.keywords=${{ env.IMAGE_KEYWORDS }}
            io.artifacthub.package.license=Apache-2.0
            io.artifacthub.package.logo-url=${{ env.IMAGE_LOGO_URL }}
            io.artifacthub.package.prerelease=false
            containers.bootc=1
          sep-tags: " "
          sep-annotations: " "

      - name: Build Image
        id: build_image
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 # v2
        with:
          containerfiles: |
            ./mimos.containerfile
          image: ${{ env.IMAGE_NAME }}
          tags: build
          oci: true

      - name: Get Chunkah config
        id: chunkah_config
        run: |
          echo "config=$(sudo buildah inspect localhost/${{ env.IMAGE_NAME }}:build | jq -c .)" >> $GITHUB_OUTPUT

      - name: Rechunk Image with Chunkah
        id: rechunk
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 # v2
        with:
          containerfiles: |
            ./chunkah.containerfile
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          oci: true
          extra-args: --skip-unused-stages=false
          build-args: |
            SOURCE_IMAGE=localhost/${{ env.IMAGE_NAME }}:build
            CHUNKAH_CONFIG_STR=${{ steps.chunkah_config.outputs.config }}

      # - name: Rechunk Image with Chunkah
      #   id: rechunk
      #   run: |
      #     # Rechunk the image using chunkah
      #     SOURCE_IMAGE="containers-storage:localhost/${{ env.IMAGE_NAME }}:build"
      #     CHUNKAH_CONFIG_STR=$(sudo podman inspect "${SOURCE_IMAGE}" | jq -c .)
      #     sudo buildah build \
      #       --skip-unused-stages=false \
      #       --build-arg SOURCE_IMAGE="${SOURCE_IMAGE}" \
      #       --build-arg CHUNKAH_CONFIG_STR="${CHUNKAH_CONFIG_STR}" \
      #       --tag localhost/${{ env.IMAGE_NAME }}:latest \
      #       -f ./chunkah.containerfile .

      #     # Retags the chunkah-built image
      #     for tag in ${{ steps.metadata.outputs.tags }}; do
      #       sudo buildah tag \
      #       localhost/${{ env.IMAGE_NAME }}:latest \
      #       localhost/${{ env.IMAGE_NAME }}:${tag##*:}
      #     done

      - name: Push to GHCR
        id: push
        if: github.event_name != 'pull_request'
        uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.metadata.outputs.tags }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)

      - name: Sign container image
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          IMAGE_FULL="${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}"
          cosign sign -y --key env://COSIGN_PRIVATE_KEY "${IMAGE_FULL}@${{ steps.push.outputs.digest }}"
        env:
          COSIGN_EXPERIMENTAL: false
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
